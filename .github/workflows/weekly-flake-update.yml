---
name: Weekly flake.lock update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"  # runs weekly on Sunday at 3AM

jobs:
  nix-flake-update:
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable flakes
        run: |
          echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf

      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v28
      - uses: DeterminateSystems/update-flake-lock@main
        with:
          pr-title: "Update flake.lock"
          pr-labels: |
            dependencies
            automated
