---
name: Test build

on:
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
env:
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: experimental-features = nix-command flakes

      - name: Setup caches
        run: |
        nix profile add nixpkgs#cachix

        CACHES=(
            amanako
            nix-community
            yazi
            niri
            noctalia
            helix
          )
          for cache in "${CACHES[@]}"; do
            cachix use "$cache"
          done

          echo "substituters = https://attic.xuyh0120.win/lantian" | sudo tee -a /etc/nix/nix.conf
          echo "trusted-public-keys = lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=" | sudo tee -a /etc/nix/nix.conf

      - name: Lint flake
        uses: DeterminateSystems/flake-checker-action@v12

      - name: Build flake
        run: |
          set -xeuo pipefail
          nix --accept-flake-config run github:juspay/omnix#default -- ci run --results=om.json

      - name: Push to cache
        run: |
          nix run github:juspay/cachix-push -- --cache amanako \
            --subflake ROOT --prefix "$(git branch --show-current)" < om.json
