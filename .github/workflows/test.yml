name: Test
env:
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

on:
  pull_request:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Add runner to nixbld group
        run: |
          sudo usermod -aG nixbld runner
          newgrp nixbld

      - name: Enable nix-command & flakes
        run: |
          echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf
          export NIX_CONFIG="experimental-features = nix-command flakes"

      - name: Add nixos and nix-cachyos-kernel caches
        run: |
          echo "substituters = https://cache.nixos.org https://attic.xuyh0120.win/lantian" \
            | sudo tee -a /etc/nix/nix.conf

          echo "trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=" \
            | sudo tee -a /etc/nix/nix.conf

      - name: Check flake
        run: nix flake check -L

      - name: Install needed packages
        run: nix --accept-flake-config profile install nixpkgs#cachix github:juspay/omnix github:juspay/cachix-push

      - name: Setup Cachix caches
        run: |
          CACHES=(
            amanako
            nix-community
            yazi
            niri
            noctalia
            helix
          )
          for cache in "${CACHES[@]}"; do
            cachix use "$cache"
          done

      - name: Build output
        run: om ci run --results=/om.json

      - name: Push to cache
        run: cachix-push-om-outputs -c amanako --subflake ROOT --prefix "$(git rev-parse --short HEAD)" < /om.json

