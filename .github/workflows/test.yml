name: Test
env:
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

on:
  pull_request:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Nix (still needed for the `nix` command itself)
      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Enable the new command & flakes (same as before)
      - name: Enable nix-command & flakes
        run: |
          echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf
          export NIX_CONFIG="experimental-features = nix-command flakes"
          nix --version

      # Optional: Flake check (still useful)
      - name: Flake check
        run: nix flake check -L
        timeout-minutes: 30

      # Setup Cachix (needs the `cachix` binary from nixpkgs)
      - name: Install Cachix binary
        run: nix-env -iA cachix -f https://github.com/NixOS/nixpkgs/tarball/nixpkgs-unstable

      - name: Setup Cachix caches
        run: |
          CACHES=(
            amanako
            nix-community
            yazi
            niri
            noctalia
            helix
          )
          for cache in "${CACHES[@]}"; do
            cachix use "$cache"
          done

      # Build output using `nix run` → omnix
      - name: Build output
        run: |
          nix run github:juspay/omnix#default -- \
            ci run --results=/om.json

      # Push to cache using `nix run` → cachix-push
      - name: Push to cache
        run: |
          nix run github:juspay/cachix-push#default -- \
            -c amanako \
            --subflake ROOT \
            --prefix "$(git rev-parse --short HEAD)" < /om.json

