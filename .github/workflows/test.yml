name: "Test"

env:
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
on:
  pull_request:
  push:

jobs:
  tests:
    runs-on: nixos-unstable

    steps:
      - uses: actions/checkout@v4

      - name: Flake check
        run: nix flake check -L
        timeout-minutes: 30

      - name: Install Needed Packages
        run: nix profile add github:juspay/omnix github:juspay/cachix-push nixpkgs#cachix
      - name: Setup Cachix
        run: |
          CACHES=(
            'amanako'
            'nix-community'
            'yazi'
            'niri'
            'noctalia'
            'helix'
          )
          for cache in ${CACHES[@]}; do
            cachix use $cache
          done
      - name: Build output
        run: om ci run --results=/om.json
      - name: Push to cache
        run: cachix-push-om-outputs -c amanako --subflake ROOT --prefix "$(git rev-parse --short HEAD)" < /om.json
