---
name: build-and-push
on:
  push:
    branches: [main, dev]
    paths:
      - modules/**
      - .github/workflows/*
      - flake.nix
      - flake.lock

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wimpysworld/nothing-but-nix@v10
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup packages
        run: |
          nix --accept-flake-config profile add \
            github:juspay/omnix#default \
            github:juspay/cachix-push#default

      - name: Build flake outputs
        run: om ci run --results=om.json -- --accept-flake-config

      - name: Push to cache
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          cachix-push-om-outputs -c amanako \
            --subflake ROOT \
            --prefix "$(git branch --show-current)" < om.json
