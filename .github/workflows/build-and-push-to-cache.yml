---
name: build-and-push
on:
  push:
    branches: [main]

env:
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          accept-flake-config = true

    - name: Setup packages
      run: |
        nix profile add \
          github:juspay/omnix#default \
          github:juspay/cachix-push#default

    - name: Build flake outputs
      run: om ci run --results=om.json

    - name: Push to cache
      run: cachix-push-om-outputs -c amanako \
        --subflake ROOT \
        --prefix "$(git branch --show-current)" < om.json
