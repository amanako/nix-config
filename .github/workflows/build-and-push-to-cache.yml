---
name: build-and-push
on:
  push:
    branches: [main, dev]
    paths:
      - modules/**
      - .github/workflows/*
      - flake.nix
      - flake.lock

env:
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clean bloat
      - uses: wimpysworld/nothing-but-nix@v10

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            always-allow-substitutes = true
            accept-flake-config = true
            fallback = true

      - name: Setup caches
        uses: cachix/cachix-action@v17
        with:
          name: amanako
          skipPush: true

      - name: Setup packages
        run: |
          nix profile add \
            github:juspay/omnix#default \
            github:juspay/cachix-push#default

      - name: Build flake outputs
        run: om ci run --results=om.json

      - name: Push to cache
        run: |
          cachix-push-om-outputs -c amanako \
            --subflake ROOT \
            --prefix "$(git branch --show-current)" < om.json
