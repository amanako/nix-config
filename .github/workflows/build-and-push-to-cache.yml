---
name: build-and-push
on:
  push:
    branches: [main]

env:
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          extra-substituters = https://attic.xuyh0120.win/lantian https://cache.nixos.asia/oss
          extra-trusted-public-keys = lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc= oss:KO872wNJkCDgmGN3xy9dT89WAhvv13EiKncTtHDItVU=
          accept-flake-config = true

    - name: Setup caches
      uses: cachix/cachix-action@v17
      with:
        name: amanako
        extraPullNames: >
          nix-community, yazi, niri, noctalia,
          helix, nix-gaming, vic, fzakaria
        skipPush: true

    - name: Setup packages
      run: |
        nix --accept-flake-config profile add \
          github:juspay/omnix#default \
          github:juspay/cachix-push#default

    - name: Build flake outputs
      run: om ci run --results=om.json

    - name: Push to cache
      run: cachix-push-om-outputs -c amanako \
        --subflake ROOT \
        --prefix "$(git branch --show-current)" < om.json
