when:
  - event: push
    branch: main

steps:
  - name: flake-check
    image: nixos/nix:latest
    commands:
      - nix run .#write-flake --show-trace --extra-experimental-features "nix-command flakes"
      - nix flake check -L --extra-experimental-features "nix-command flakes"

  - name: setup-nix-and-cache
    image: nixos/nix:latest
    commands:
      - nix profile add nixpkgs#cachix --extra-experimental-features "nix-command"
      # posix-compliant list
      - |
        for cache in \
          amanako \
          nix-community \
          yazi \
          niri \
          noctalia \
          helix \
          nix-gaming \
          vic \
          fzakaria
        do
          cachix use "$cache"
        done
      - |
        tee -a /etc/nix/nix.conf <<'EOF'
        substituters = https://attic.xuyh0120.win/lantian
        trusted-public-keys = lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=
        EOF

  - name: build-flake
    image: nixos/nix:latest
    commands:
      - set -xeuo pipefail
      - nix run .#write-flake --show-trace --extra-experimental-features "nix-command flakes"
      - nix --accept-flake-config run github:juspay/omnix#default -- ci run --results=om.json --extra-experimental-features "nix-command flakes"

  - name: push-to-cache
    image: nixos/nix:latest
    environment:
      CACHIX_AUTH_TOKEN: ${CACHIX_AUTH_TOKEN}
    commands:
      - nix run --extra-experimental-features "nix-command" \
          github:juspay/cachix-push -- \
          --cache amanako \
          --subflake ROOT \
          --prefix "$(git rev-parse --abbrev-ref HEAD)" < om.json
