when:
  - event: cron
    cron: "40 3 * * 0"

steps:
  - name: update-and-check-flake
    image: nixos/nix:latest
    commands: 
      - |
        tee -a /etc/nix/nix.conf <<'EOF'
        experimental-features = nix-command flakes
        accept-flake-config = true
        EOF
      - echo "experimental-features = nix-command flakes" | tee -a /etc/nix/nix.conf
      - nix run .#write-flake --show-trace
      - nix flake update
      - nix run .#write-flake --show-trace
      - nix flake check -L

  - name: commit-and-push
    image: alpine/git:latest
    environment:
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL}
      GITEA_TOKEN: ${GITEA_TOKEN}
    commands:
      - git config user.name "${GIT_AUTHOR_NAME}"
      - git config user.email "${GIT_AUTHOR_EMAIL}"
      - |
        BRANCH="weekly-flake-update-$(date +%Y%m%d%H%M%S)"
        git checkout -b "$BRANCH"
        git add flake.lock
        
        if git diff --cached --quiet; then
          echo "flake.lock unchanged – nothing to do."
          exit 0
        fi

        git commit -m "Weekly flake.lock update"
        git push https://x-access-token:${GITEA_TOKEN}@codeberg.org/${CI_REPO}.git "$BRANCH"
        
        echo "$BRANCH" > /tmp/branch_name
  - name: open-pr
    image: curlimages/curl:8
    environment:
      GITEA_TOKEN: ${GITEA_TOKEN}
    commands:
      - |
        BRANCH=$(cat /tmp/branch_name 2>/dev/null || echo "")
        if [ -z "$BRANCH" ]; then
          echo "No branch to PR – exiting."
          exit 0
        fi

        PAYLOAD=$(cat <<'EOF'
        {
          "title": "Weekly flake.lock update",
          "head": "$BRANCH",
          "base": "main",
          "body": "Automated weekly flake.lock update.\n\n- Dependencies refreshed via `nix flake update`."
        }
        EOF
        )

        curl -sSL -X POST \
          -H "Authorization: token ${GITEA_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "https://codeberg.org/api/v1/repos/${CI_REPO}/pulls" \
          | jq '.html_url // "PR creation failed"'
