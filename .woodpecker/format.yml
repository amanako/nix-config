when:
  - event: push
    branch: main

steps:
  - name: format nix with alejandra
    image: alpine:3.20
    commands:
      - apk add --no-cache curl gnupg
      - curl -L https://nixos.org/nix/install | sh
      - . /root/.nix-profile/etc/profile.d/nix.sh
      - nix-env -iA nixpkgs.alejandra
      - alejandra -c **/*.nix

  - name: format markdown with mdformat
    image: alpine:3.20
    commands:
      - apk add --no-cache py3-pip
      - pip install mdformat
      - mdformat -c **/*.md

  - name: format lua with stylua
    image: alpine:3.20
    commands:
      - curl -L -o /usr/local/bin/stylua \
        https://github.com/JohnnyMorganz/StyLua/releases/download/v2.5.2/stylua-linux-x86_64.gz
      - gunzip /usr/local/bin/stylua
      - chmod +x /usr/local/bin/stylua
      - stylua -c **/*.lua
