when:
  - event: cron
    cron: "bump flake"  # Runs Sunday 03:40 UTC
  - event: manual

steps:
  - name: update-and-check-flake
    image: nixos/nix:latest
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - |
        tee -a /etc/nix/nix.conf <<EOF
        experimental-features = nix-command flakes
        accept-flake-config = true
        EOF
      - nix run .#write-flake --show-trace
      - nix flake update

      - nix run .#write-flake --show-trace
      - nix flake check -L

  - name: commit-and-push
    image: alpine/git:latest
    environment:
      GIT_AUTHOR_NAME:
        from_secret: GIT_AUTHOR_NAME
      GIT_AUTHOR_EMAIL:
        from_secret: GIT_AUTHOR_EMAIL
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
    commands:
      - |
        git config --global user.name "$${GIT_AUTHOR_NAME}"
        git config --global user.email "$${GIT_AUTHOR_EMAIL}"

      - |
        BRANCH="weekly-flake-update_$(date +%h/%d/%Y_%H-%M-%S)"
        git checkout -b "$BRANCH"
        git add flake.lock

      - |
        if git diff --cached --quiet; then
          echo "flake.lock unchanged – nothing to do."
          exit 0
        fi

      - |
        git commit -m "Weekly flake.lock update"
        git push https://x-access-token:$${GITEA_TOKEN}@codeberg.org/${CI_REPO}.git "$BRANCH"

      - echo "BRANCH=$BRANCH" >> $${WOODPECKER_ENV}

  - name: open-pr
    image: woodpeckercommunity/gitea-pull-request-create-plugin:latest
    pull: true
    settings:
      gitea_address: https://codeberg.org
      gitea_token:
        from_secret: GITEA_TOKEN
      owner: ${CI_REPO_OWNER}
      repo: ${CI_REPO_NAME}
      branch: ${BRANCH}
      base_branch: main
      pr_title: Bump flake
      pr_body: |
        Update flake.lock dependencies.
        PR automatically created by Woodpecker CI.
      skip_on_missing_branch: true
      skip_on_empty_branch: true
      close_pr_if_empty: true
      delete_branch_if_pr_empty: true
      merge_when_checks_succeed: true
      delete_branch_after_merge: true
