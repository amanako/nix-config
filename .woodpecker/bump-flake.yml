when:
  - event: cron
    cron: "bump flake"  # Runs Sunday 03:40 UTC
  - event: manual

steps:
  - name: update-and-check-flake
    image: nixos/nix:latest
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - |
        tee -a /etc/nix/nix.conf <<EOF
        experimental-features = nix-command flakes
        access-tokens = github.com=$${GITHUB_TOKEN}
        accept-flake-config = true
        EOF
      - nix run .#write-flake --show-trace
      - nix flake update

      - nix run .#write-flake --show-trace
      - nix flake check -L

  - name: commit-and-push
    image: alpine/git:latest
    environment:
      GIT_AUTHOR_NAME:
        from_secret: GIT_AUTHOR_NAME
      GIT_AUTHOR_EMAIL:
        from_secret: GIT_AUTHOR_EMAIL
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
      GPG_PRIVATE_KEY:
        from_secret: GPG_PRIVATE_KEY
      GPG_PASSPHRASE:
        from_secret: GPG_PASSPHRASE
      GPG_KEY_ID:
        from_secret: GPG_KEY_ID
    commands:
      - |
        apk add --no-cache gnupg pinentry
        export GNUPGHOME=$(mktemp -d)
        chmod 700 "$GNUPGHOME"

        gpg --batch --import <<EOF
        $${GPG_PRIVATE_KEY}
        EOF

        if [ -n "$${GPG_PASSPHRASE}" ]; then
          echo "$${GPG_PASSPHRASE}" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --import-options import-reset --import
        fi

      - gpg --list-secret-keys "$${GPG_KEY_ID}"

      - |
        # Setup git with signed commits
        git config --global user.name "$${GIT_AUTHOR_NAME}"
        git config --global user.email "$${GIT_AUTHOR_EMAIL}"
        git config --global user.signingKey "$${GPG_KEY_ID}"
        git config --global commit.gpgsign true
        git config --global gpg.program gpg

      - |
        # Prevent gpg from trying to use a tty
        export GIT_TRACE=1 GIT_TRACE_SETUP=1
        export GPG_TTY=$(tty || true)
        export GPG_AGENT_INFO=
        export GPGME_USE_STDIO=1
          export PINENTRY_USER_DATA=
        export GPG_OPTS="--pinentry-mode loopback --batch --yes"

      - |
        BRANCH="weekly flake update $(date +%h-%d-%Y_%H:%M:%S)"
        git checkout -b "$BRANCH"
        git add flake.lock

        if git diff --cached --quiet; then
          echo "flake.lock unchanged – nothing to do."
          exit 0
        fi

        git commit -m "Weekly flake.lock update"
        git push https://x-access-token:$${GITEA_TOKEN}@codeberg.org/${CI_REPO}.git "$BRANCH"

        echo "$BRANCH" > /tmp/branch_name

  - name: open-pr
    image: alpine:3.19
    environment:
      GITEA_TOKEN: $${GITEA_TOKEN}
    commands:
      - apk add --no-cache curl jq
      - |
        BRANCH=${CI_COMMIT_BRANCH}
        if [ -z "$BRANCH" ]; then
          echo "No branch to PR – exiting."
          exit 0
        fi

        PAYLOAD=$(cat <<EOF
        {
          "title": "Weekly flake.lock update",
          "head": "$BRANCH",
          "base": "main",
          "body": "Automated weekly flake.lock update.\n\n- Dependencies refreshed via nix flake update."
        }
        EOF
        )

        curl -sSL -X POST \
          -H "Authorization: token $${GITEA_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "https://codeberg.org/api/v1/repos/${CI_REPO}/pulls" \
          | jq -r '.html_url // "PR creation failed"'
